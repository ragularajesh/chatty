<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatty - Live Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>Chatty 💬</h1>
        </header>
        
        <ul id="messages"></ul>

        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="Type a message..." required />
            <button>Send</button>
        </form>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Connect automatically to the current website domain
        const socket = io();

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        // Ask for username when entering the site
        const username = prompt("Enter your name to join Chatty:") || "Anonymous";

        // --- Ask for permission to show notifications as soon as they log in ---
        if ("Notification" in window) {
            Notification.requestPermission();
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                const data = {
                    user: username,
                    text: input.value
                };
                // Send message data to server
                socket.emit('chat message', data);
                input.value = '';
            }
        });

        // Listen for incoming broadcasted messages from server
        socket.on('chat message', function(data) {
            const item = document.createElement('li');
            
            // Highlight our own messages differently
            if(data.user === username) {
                item.classList.add('my-message');
            } else {
                item.classList.add('other-message');
            }

            item.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
            messages.appendChild(item);
            
            // Smoothly auto-scroll to the latest message
            window.scrollTo(0, document.body.scrollHeight);

            // --- Send a system notification only if: ---
            // 1. You are looking at a different tab (document.hidden)
            // 2. You clicked "Allow" (Notification.permission === "granted")
            // 3. The message was sent by someone else (data.user !== username)
            if (document.hidden && Notification.permission === "granted" && data.user !== username) {
                new Notification(`New message from ${data.user}`, {
                    body: data.text,
                    icon: "https://cdn-icons-png.flaticon.com/512/1041/1041916.png"
                });
            }
        });
    </script>
</body>
</html>
